naftiko: 1.0.0-alpha2
info:
  label: Looker Analytics and Reporting
  description: Unified workflow for business intelligence analytics including dashboards, looks, queries, and user management.
    Used by data analysts and BI administrators.
  tags:
  - Looker
  - Business Intelligence
  - Analytics
  - Dashboards
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    LOOKER_CLIENT_ID: LOOKER_CLIENT_ID
    LOOKER_CLIENT_SECRET: LOOKER_CLIENT_SECRET
capability:
  consumes:
  - type: http
    namespace: looker
    baseUri: https://your-instance.looker.com:19999/api/4.0
    description: Looker API 4.0 for business intelligence operations.
    authentication:
      type: bearer
      token: '{{LOOKER_ACCESS_TOKEN}}'
    resources:
    - name: auth
      path: /login
      description: Authentication.
      operations:
      - name: login
        method: POST
        description: Authenticate and obtain an access token.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: logout
        method: DELETE
        description: Log out and invalidate the current access token.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: looks
      path: /looks
      description: Look management.
      operations:
      - name: list-looks
        method: GET
        description: List all looks.
        inputParameters:
        - name: fields
          in: query
          type: string
          required: false
          description: Fields to include in response.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: looks-search
      path: /looks/search
      description: Search looks.
      operations:
      - name: search-looks
        method: GET
        description: Search for looks by title or other criteria.
        inputParameters:
        - name: title
          in: query
          type: string
          required: false
          description: Title to search for.
        - name: space_id
          in: query
          type: string
          required: false
          description: Space ID to filter by.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: look-details
      path: /looks/{look_id}
      description: Individual look management.
      operations:
      - name: get-look
        method: GET
        description: Get look details.
        inputParameters:
        - name: look_id
          in: path
          type: integer
          required: true
          description: Look ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-look
        method: PATCH
        description: Update a look.
        inputParameters:
        - name: look_id
          in: path
          type: integer
          required: true
          description: Look ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            title: '{{tools.title}}'
      - name: delete-look
        method: DELETE
        description: Delete a look.
        inputParameters:
        - name: look_id
          in: path
          type: integer
          required: true
          description: Look ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: look-run
      path: /looks/{look_id}/run/{result_format}
      description: Run a look.
      operations:
      - name: run-look
        method: GET
        description: Run a look and return results.
        inputParameters:
        - name: look_id
          in: path
          type: integer
          required: true
          description: Look ID.
        - name: result_format
          in: path
          type: string
          required: true
          description: Result format (json, csv, etc).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dashboards
      path: /dashboards
      description: Dashboard management.
      operations:
      - name: list-dashboards
        method: GET
        description: List all dashboards.
        inputParameters:
        - name: fields
          in: query
          type: string
          required: false
          description: Fields to include.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-dashboard
        method: POST
        description: Create a new dashboard.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            title: '{{tools.title}}'
            space_id: '{{tools.spaceId}}'
    - name: dashboards-search
      path: /dashboards/search
      description: Search dashboards.
      operations:
      - name: search-dashboards
        method: GET
        description: Search for dashboards.
        inputParameters:
        - name: title
          in: query
          type: string
          required: false
          description: Title to search for.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dashboard-details
      path: /dashboards/{dashboard_id}
      description: Individual dashboard management.
      operations:
      - name: get-dashboard
        method: GET
        description: Get dashboard details.
        inputParameters:
        - name: dashboard_id
          in: path
          type: string
          required: true
          description: Dashboard ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-dashboard
        method: PATCH
        description: Update a dashboard.
        inputParameters:
        - name: dashboard_id
          in: path
          type: string
          required: true
          description: Dashboard ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            title: '{{tools.title}}'
      - name: delete-dashboard
        method: DELETE
        description: Delete a dashboard.
        inputParameters:
        - name: dashboard_id
          in: path
          type: string
          required: true
          description: Dashboard ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: queries
      path: /queries
      description: Query management.
      operations:
      - name: create-query
        method: POST
        description: Create a query.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            model: '{{tools.model}}'
            view: '{{tools.view}}'
    - name: query-details
      path: /queries/{query_id}
      description: Individual query operations.
      operations:
      - name: get-query
        method: GET
        description: Get query details.
        inputParameters:
        - name: query_id
          in: path
          type: integer
          required: true
          description: Query ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: query-run
      path: /queries/{query_id}/run/{result_format}
      description: Run a query.
      operations:
      - name: run-query
        method: GET
        description: Run a saved query.
        inputParameters:
        - name: query_id
          in: path
          type: integer
          required: true
          description: Query ID.
        - name: result_format
          in: path
          type: string
          required: true
          description: Result format.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users
      path: /users
      description: User management.
      operations:
      - name: list-users
        method: GET
        description: List all users.
        inputParameters:
        - name: fields
          in: query
          type: string
          required: false
          description: Fields to include.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-user
        method: POST
        description: Create a new user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            first_name: '{{tools.firstName}}'
            last_name: '{{tools.lastName}}'
    - name: user-details
      path: /users/{user_id}
      description: Individual user management.
      operations:
      - name: get-user
        method: GET
        description: Get user details.
        inputParameters:
        - name: user_id
          in: path
          type: integer
          required: true
          description: User ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-user
        method: PATCH
        description: Update a user.
        inputParameters:
        - name: user_id
          in: path
          type: integer
          required: true
          description: User ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            first_name: '{{tools.firstName}}'
      - name: delete-user
        method: DELETE
        description: Delete a user.
        inputParameters:
        - name: user_id
          in: path
          type: integer
          required: true
          description: User ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: looker-analytics-api
    description: Unified REST API for Looker analytics and reporting.
    resources:
    - path: /v1/looks
      name: looks
      description: Look management.
      operations:
      - method: GET
        name: list-looks
        description: List all looks.
        call: looker.list-looks
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/looks/{id}
      name: look-details
      description: Individual look management.
      operations:
      - method: GET
        name: get-look
        description: Get look details.
        call: looker.get-look
        with:
          look_id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: update-look
        description: Update a look.
        call: looker.update-look
        with:
          look_id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-look
        description: Delete a look.
        call: looker.delete-look
        with:
          look_id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/dashboards
      name: dashboards
      description: Dashboard management.
      operations:
      - method: GET
        name: list-dashboards
        description: List all dashboards.
        call: looker.list-dashboards
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-dashboard
        description: Create a dashboard.
        call: looker.create-dashboard
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/dashboards/{id}
      name: dashboard-details
      description: Individual dashboard management.
      operations:
      - method: GET
        name: get-dashboard
        description: Get dashboard details.
        call: looker.get-dashboard
        with:
          dashboard_id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: update-dashboard
        description: Update a dashboard.
        call: looker.update-dashboard
        with:
          dashboard_id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-dashboard
        description: Delete a dashboard.
        call: looker.delete-dashboard
        with:
          dashboard_id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/queries
      name: queries
      description: Query management.
      operations:
      - method: POST
        name: create-query
        description: Create a query.
        call: looker.create-query
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/queries/{id}
      name: query-details
      description: Individual query operations.
      operations:
      - method: GET
        name: get-query
        description: Get query details.
        call: looker.get-query
        with:
          query_id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users
      name: users
      description: User management.
      operations:
      - method: GET
        name: list-users
        description: List all users.
        call: looker.list-users
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-user
        description: Create a user.
        call: looker.create-user
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9080
    namespace: looker-analytics-mcp
    transport: http
    description: MCP server for AI-assisted Looker analytics and reporting.
    tools:
    - name: list-looks
      description: List all saved looks.
      hints:
        readOnly: true
        openWorld: true
      call: looker.list-looks
      outputParameters:
      - type: object
        mapping: $.
    - name: search-looks
      description: Search for looks by title.
      hints:
        readOnly: true
      call: looker.search-looks
      outputParameters:
      - type: object
        mapping: $.
    - name: get-look
      description: Get look details.
      hints:
        readOnly: true
      call: looker.get-look
      with:
        look_id: tools.lookId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-look
      description: Update a look.
      hints:
        readOnly: false
        idempotent: true
      call: looker.update-look
      with:
        look_id: tools.lookId
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-look
      description: Delete a look.
      hints:
        destructive: true
        idempotent: true
      call: looker.delete-look
      with:
        look_id: tools.lookId
      outputParameters:
      - type: object
        mapping: $.
    - name: run-look
      description: Run a look and return results.
      hints:
        readOnly: true
      call: looker.run-look
      with:
        look_id: tools.lookId
        result_format: tools.resultFormat
      outputParameters:
      - type: object
        mapping: $.
    - name: list-dashboards
      description: List all dashboards.
      hints:
        readOnly: true
        openWorld: true
      call: looker.list-dashboards
      outputParameters:
      - type: object
        mapping: $.
    - name: search-dashboards
      description: Search for dashboards.
      hints:
        readOnly: true
      call: looker.search-dashboards
      outputParameters:
      - type: object
        mapping: $.
    - name: create-dashboard
      description: Create a new dashboard.
      hints:
        readOnly: false
      call: looker.create-dashboard
      outputParameters:
      - type: object
        mapping: $.
    - name: get-dashboard
      description: Get dashboard details.
      hints:
        readOnly: true
      call: looker.get-dashboard
      with:
        dashboard_id: tools.dashboardId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-dashboard
      description: Update a dashboard.
      hints:
        readOnly: false
        idempotent: true
      call: looker.update-dashboard
      with:
        dashboard_id: tools.dashboardId
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-dashboard
      description: Delete a dashboard.
      hints:
        destructive: true
        idempotent: true
      call: looker.delete-dashboard
      with:
        dashboard_id: tools.dashboardId
      outputParameters:
      - type: object
        mapping: $.
    - name: create-query
      description: Create a query.
      hints:
        readOnly: false
      call: looker.create-query
      outputParameters:
      - type: object
        mapping: $.
    - name: get-query
      description: Get query details.
      hints:
        readOnly: true
      call: looker.get-query
      with:
        query_id: tools.queryId
      outputParameters:
      - type: object
        mapping: $.
    - name: run-query
      description: Run a saved query.
      hints:
        readOnly: true
      call: looker.run-query
      with:
        query_id: tools.queryId
        result_format: tools.resultFormat
      outputParameters:
      - type: object
        mapping: $.
    - name: list-users
      description: List all users.
      hints:
        readOnly: true
        openWorld: true
      call: looker.list-users
      outputParameters:
      - type: object
        mapping: $.
    - name: create-user
      description: Create a new user.
      hints:
        readOnly: false
      call: looker.create-user
      outputParameters:
      - type: object
        mapping: $.
    - name: get-user
      description: Get user details.
      hints:
        readOnly: true
      call: looker.get-user
      with:
        user_id: tools.userId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-user
      description: Update a user.
      hints:
        readOnly: false
        idempotent: true
      call: looker.update-user
      with:
        user_id: tools.userId
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-user
      description: Delete a user.
      hints:
        destructive: true
        idempotent: true
      call: looker.delete-user
      with:
        user_id: tools.userId
      outputParameters:
      - type: object
        mapping: $.
