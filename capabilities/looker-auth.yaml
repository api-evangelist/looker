naftiko: 1.0.0-alpha2
info:
  label: Looker API — Auth
  description: 'Looker API — Auth. 2 operations. Lead operation: Looker Log in. Self-contained Naftiko capability covering
    one Looker business surface.'
  tags:
  - Looker
  - Auth
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LOOKER_API_KEY: LOOKER_API_KEY
capability:
  consumes:
  - type: http
    namespace: looker-auth
    baseUri: https://{instance}.looker.com/api/4.0
    description: Looker API — Auth business capability. Self-contained, no shared references.
    resources:
    - name: login
      path: /login
      operations:
      - name: login
        method: POST
        description: Looker Log in
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: logout
      path: /logout
      operations:
      - name: logout
        method: DELETE
        description: Looker Log Out
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.LOOKER_API_KEY}}'
  exposes:
  - type: rest
    namespace: looker-auth-rest
    port: 8080
    description: REST adapter for Looker API — Auth. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/login
      name: login
      description: REST surface for login.
      operations:
      - method: POST
        name: login
        description: Looker Log in
        call: looker-auth.login
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/logout
      name: logout
      description: REST surface for logout.
      operations:
      - method: DELETE
        name: logout
        description: Looker Log Out
        call: looker-auth.logout
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: looker-auth-mcp
    port: 9090
    transport: http
    description: MCP adapter for Looker API — Auth. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: looker-log
      description: Looker Log in
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: looker-auth.login
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: looker-log-out
      description: Looker Log Out
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: looker-auth.logout
      outputParameters:
      - type: object
        mapping: $.
