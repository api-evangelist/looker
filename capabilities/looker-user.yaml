        last_name: tools.last_name
        email: tools.email
        is_disabled: tools.is_disabled
        sorts: tools.sorts
      outputParameters:
      - type: object
        mapping: $.
    - name: looker-get-user
      description: Looker Get a User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: looker-user.user
      outputParameters:
      - type: object
        mapping: $.
    - name: looker-update-user
      description: Looker Update a User
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: looker-user.updateuser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: looker-delete-user
      description: Looker Delete a User
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: looker-user.deleteuser
      outputParameters:
      - type: object
        mapping: $.
    - name: looker-get-user-roles
      description: Looker Get User Roles
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: looker-user.userroles
      outputParameters:
      - type: object
