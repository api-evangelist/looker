naftiko: "1.0.0-alpha1"

info:
  label: "Looker API"
  description: "Looker API 4.0 for managing dashboards, looks, queries, and users on the Looker business intelligence platform."
  tags:
    - Looker
    - Business Intelligence
    - Analytics
    - Dashboards
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      LOOKER_CLIENT_ID: LOOKER_CLIENT_ID
      LOOKER_CLIENT_SECRET: LOOKER_CLIENT_SECRET

capability:
  consumes:
    - type: http
      namespace: looker
      baseUri: https://your-instance.looker.com:19999/api/4.0
      description: "Looker API 4.0 for business intelligence operations."
      authentication:
        type: bearer
        token: "{{LOOKER_ACCESS_TOKEN}}"
      resources:
        - name: auth
          path: /login
          description: "Authentication."
          operations:
            - name: login
              method: POST
              description: "Authenticate and obtain an access token."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: logout
              method: DELETE
              description: "Log out and invalidate the current access token."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: looks
          path: /looks
          description: "Look management."
          operations:
            - name: list-looks
              method: GET
              description: "List all looks."
              inputParameters:
                - name: fields
                  in: query
                  type: string
                  required: false
                  description: "Fields to include in response."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: looks-search
          path: /looks/search
          description: "Search looks."
          operations:
            - name: search-looks
              method: GET
              description: "Search for looks by title or other criteria."
              inputParameters:
                - name: title
                  in: query
                  type: string
                  required: false
                  description: "Title to search for."
                - name: space_id
                  in: query
                  type: string
                  required: false
                  description: "Space ID to filter by."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: look-details
          path: /looks/{look_id}
          description: "Individual look management."
          operations:
            - name: get-look
              method: GET
              description: "Get look details."
              inputParameters:
                - name: look_id
                  in: path
                  type: integer
                  required: true
                  description: "Look ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-look
              method: PATCH
              description: "Update a look."
              inputParameters:
                - name: look_id
                  in: path
                  type: integer
                  required: true
                  description: "Look ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  title: "{{tools.title}}"
            - name: delete-look
              method: DELETE
              description: "Delete a look."
              inputParameters:
                - name: look_id
                  in: path
                  type: integer
                  required: true
                  description: "Look ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: look-run
          path: /looks/{look_id}/run/{result_format}
          description: "Run a look."
          operations:
            - name: run-look
              method: GET
              description: "Run a look and return results."
              inputParameters:
                - name: look_id
                  in: path
                  type: integer
                  required: true
                  description: "Look ID."
                - name: result_format
                  in: path
                  type: string
                  required: true
                  description: "Result format (json, csv, etc)."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: dashboards
          path: /dashboards
          description: "Dashboard management."
          operations:
            - name: list-dashboards
              method: GET
              description: "List all dashboards."
              inputParameters:
                - name: fields
                  in: query
                  type: string
                  required: false
                  description: "Fields to include."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-dashboard
              method: POST
              description: "Create a new dashboard."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  title: "{{tools.title}}"
                  space_id: "{{tools.spaceId}}"
        - name: dashboards-search
          path: /dashboards/search
          description: "Search dashboards."
          operations:
            - name: search-dashboards
              method: GET
              description: "Search for dashboards."
              inputParameters:
                - name: title
                  in: query
                  type: string
                  required: false
                  description: "Title to search for."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: dashboard-details
          path: /dashboards/{dashboard_id}
          description: "Individual dashboard management."
          operations:
            - name: get-dashboard
              method: GET
              description: "Get dashboard details."
              inputParameters:
                - name: dashboard_id
                  in: path
                  type: string
                  required: true
                  description: "Dashboard ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-dashboard
              method: PATCH
              description: "Update a dashboard."
              inputParameters:
                - name: dashboard_id
                  in: path
                  type: string
                  required: true
                  description: "Dashboard ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  title: "{{tools.title}}"
            - name: delete-dashboard
              method: DELETE
              description: "Delete a dashboard."
              inputParameters:
                - name: dashboard_id
                  in: path
                  type: string
                  required: true
                  description: "Dashboard ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: queries
          path: /queries
          description: "Query management."
          operations:
            - name: create-query
              method: POST
              description: "Create a query."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  model: "{{tools.model}}"
                  view: "{{tools.view}}"
        - name: query-details
          path: /queries/{query_id}
          description: "Individual query operations."
          operations:
            - name: get-query
              method: GET
              description: "Get query details."
              inputParameters:
                - name: query_id
                  in: path
                  type: integer
                  required: true
                  description: "Query ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: query-run
          path: /queries/{query_id}/run/{result_format}
          description: "Run a query."
          operations:
            - name: run-query
              method: GET
              description: "Run a saved query."
              inputParameters:
                - name: query_id
                  in: path
                  type: integer
                  required: true
                  description: "Query ID."
                - name: result_format
                  in: path
                  type: string
                  required: true
                  description: "Result format."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: users
          path: /users
          description: "User management."
          operations:
            - name: list-users
              method: GET
              description: "List all users."
              inputParameters:
                - name: fields
                  in: query
                  type: string
                  required: false
                  description: "Fields to include."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-user
              method: POST
              description: "Create a new user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  first_name: "{{tools.firstName}}"
                  last_name: "{{tools.lastName}}"
        - name: user-details
          path: /users/{user_id}
          description: "Individual user management."
          operations:
            - name: get-user
              method: GET
              description: "Get user details."
              inputParameters:
                - name: user_id
                  in: path
                  type: integer
                  required: true
                  description: "User ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-user
              method: PATCH
              description: "Update a user."
              inputParameters:
                - name: user_id
                  in: path
                  type: integer
                  required: true
                  description: "User ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  first_name: "{{tools.firstName}}"
            - name: delete-user
              method: DELETE
              description: "Delete a user."
              inputParameters:
                - name: user_id
                  in: path
                  type: integer
                  required: true
                  description: "User ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: looker-rest-api
      resources:
        - path: /v1/looks
          name: looks
          description: "Look management."
          operations:
            - method: GET
              name: list-looks
              description: "List all looks."
              call: "looker.list-looks"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: looker-mcp
      transport: http
      tools:
        - name: list-looks
          description: "List all looks."
          hints:
            readOnly: true
          call: "looker.list-looks"
          outputParameters:
            - type: object
              mapping: "$."
