specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Looker
providerId: looker
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - BI Platform
  - Business Intelligence
  - Embedded Analytics
description: 'FOCUS-aligned FinOps for Looker (Google Cloud): annual edition subscription (Standard /
  Enterprise / Embed) priced by sales quote, plus per-user license add-ons (Developer / Standard / Viewer)
  with per-user Conversational Analytics token quotas; overage on tokens after Oct 1 2026.'
sources:
  - https://cloud.google.com/looker/pricing
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Google LLC
serviceCategory: Business Intelligence
billingModel:
  pricingCategory: Subscription + Token Overage
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Looker
  ServiceCategory: Business Intelligence
  ProviderName: Google Cloud
  PublisherName: Google LLC
  InvoiceIssuerName: Google LLC
  BillingCurrency: USD
meters:
  - name: edition_subscription
    unit: year
    aggregation: sum
    dimensions:
      - edition
  - name: developer_users
    unit: seat
    aggregation: max
  - name: standard_users
    unit: seat
    aggregation: max
  - name: viewer_users
    unit: seat
    aggregation: max
  - name: api_calls_query
    unit: request
    aggregation: sum
    dimensions:
      - edition
  - name: api_calls_admin
    unit: request
    aggregation: sum
    dimensions:
      - edition
  - name: conversational_tokens_input
    unit: token
    aggregation: sum
    dimensions:
      - user_role
  - name: conversational_tokens_output
    unit: token
    aggregation: sum
    dimensions:
      - user_role
principles:
  - name: Visibility
    description: Track edition API call usage in the Looker admin console; track per-user Conversational
      Analytics token consumption via the Looker usage reports.
  - name: Allocation
    description: Map Looker users to Google Cloud projects/folders and tag for chargeback; allocate
      Conversational Analytics costs by user role.
  - name: Optimization
    description: Right-size edition (Standard vs Enterprise vs Embed) to API quota; prefer Standard / Viewer
      seats for read-only audiences; cache dashboards and use scheduled deliveries to reduce live API calls.
  - name: Accountability
    description: Ahead of Oct 1 2026 token billing, set per-team budgets on Conversational Analytics
      input/output tokens and review against $3/1M input + $20/1M output.
