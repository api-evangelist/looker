openapi: 3.1.0
info:
  title: Looker API
  description: >-
    The Looker API 4.0 provides programmatic access to the Looker business
    intelligence platform. It allows you to manage and interact with Looks,
    dashboards, queries, users, and other Looker resources. The API uses
    client credentials (client_id and client_secret) for authentication and
    returns JSON responses. Looker is part of Google Cloud and the API is
    available on any Looker instance at the /api/4.0 path.
  version: '4.0'
  contact:
    name: Google Cloud Looker Support
    url: https://cloud.google.com/looker/docs/support
  termsOfService: https://cloud.google.com/terms
  license:
    name: Google Cloud Terms
    url: https://cloud.google.com/terms
externalDocs:
  description: Looker API 4.0 Documentation
  url: https://cloud.google.com/looker/docs/reference/looker-api/latest
servers:
  - url: https://{instance}.looker.com/api/4.0
    description: Looker Instance API
    variables:
      instance:
        description: Your Looker instance hostname prefix
        default: your-instance
  - url: https://{instance}.cloud.looker.com/api/4.0
    description: Looker (Google Cloud core) Instance API
    variables:
      instance:
        description: Your Looker (Google Cloud core) instance hostname prefix
        default: your-instance
tags:
  - name: Auth
    description: >-
      Authentication endpoints for obtaining and managing API access
      tokens using client credentials.
  - name: Dashboard
    description: >-
      Manage dashboards, which are collections of tiles displaying
      visualizations from queries. Dashboards support filters, layouts,
      and can be shared across the organization.
  - name: Look
    description: >-
      Manage Looks, which are saved queries with visualizations. A Look
      contains a query definition and visualization configuration that can
      be shared, scheduled, and embedded.
  - name: Query
    description: >-
      Create and run queries against your Looker models. Queries define
      the fields, filters, sorts, and limits used to retrieve data from
      the underlying database through LookML models.
  - name: User
    description: >-
      Manage Looker users including creating, updating, and retrieving
      user accounts, credentials, roles, and sessions.
security:
  - bearerAuth: []
paths:
  /login:
    post:
      operationId: login
      summary: Looker Log in
      description: >-
        Authenticates with the Looker API using client credentials and
        returns an access token. The client_id and client_secret are
        generated from the Looker Admin panel under Users > API Keys.
        The returned access token must be included as a Bearer token in
        the Authorization header for all subsequent API requests.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - client_id
                - client_secret
              properties:
                client_id:
                  type: string
                  description: API client ID generated from Looker Admin
                client_secret:
                  type: string
                  description: API client secret generated from Looker Admin
      responses:
        '200':
          description: Successfully authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessToken'
        '404':
          description: Invalid client credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /logout:
    delete:
      operationId: logout
      summary: Looker Log out
      description: >-
        Revokes the current API access token, ending the authenticated
        session. After logout, the token can no longer be used.
      tags:
        - Auth
      responses:
        '204':
          description: Successfully logged out
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /looks:
    get:
      operationId: allLooks
      summary: Looker List all Looks
      description: >-
        Returns a list of all Looks accessible to the authenticated user.
        Supports filtering by fields to limit the response payload.
      tags:
        - Look
      parameters:
        - $ref: '#/components/parameters/fields'
      responses:
        '200':
          description: List of Looks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Look'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /looks/search:
    get:
      operationId: searchLooks
      summary: Looker Search Looks
      description: >-
        Searches for Looks matching the specified criteria. Supports
        filtering by title, description, space, user, and other
        attributes. Results are paginated.
      tags:
        - Look
      parameters:
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - name: title
          in: query
          description: Filter by Look title (case-insensitive match)
          schema:
            type: string
        - name: description
          in: query
          description: Filter by Look description
          schema:
            type: string
        - name: space_id
          in: query
          description: Filter by space (folder) ID
          schema:
            type: string
        - name: user_id
          in: query
          description: Filter by creator user ID
          schema:
            type: string
        - name: sorts
          in: query
          description: Sort fields (e.g. title asc, created_at desc)
          schema:
            type: string
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Look'
        '400':
          description: Invalid search parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /looks/{look_id}:
    get:
      operationId: look
      summary: Looker Get a Look
      description: >-
        Retrieves a single Look by its ID, including the query definition,
        visualization configuration, and metadata such as the creator,
        space, and sharing settings.
      tags:
        - Look
      parameters:
        - $ref: '#/components/parameters/lookId'
        - $ref: '#/components/parameters/fields'
      responses:
        '200':
          description: Look details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Look'
        '404':
          description: Look not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      operationId: updateLook
      summary: Looker Update a Look
      description: >-
        Updates an existing Look. Only the fields provided in the request
        body are updated; all other fields remain unchanged.
      tags:
        - Look
      parameters:
        - $ref: '#/components/parameters/lookId'
        - $ref: '#/components/parameters/fields'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WriteLookWithQuery'
      responses:
        '200':
          description: Updated Look
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Look'
        '404':
          description: Look not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteLook
      summary: Looker Delete a Look
      description: >-
        Permanently deletes the specified Look. This action cannot be
        undone. The Look is moved to trash first if soft delete is
        enabled.
      tags:
        - Look
      parameters:
        - $ref: '#/components/parameters/lookId'
      responses:
        '204':
          description: Look deleted successfully
        '404':
          description: Look not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /looks/{look_id}/run/{result_format}:
    get:
      operationId: runLook
      summary: Looker Run a Look
      description: >-
        Executes the query associated with a Look and returns the results
        in the specified format. Supported formats include json, csv,
        txt, xlsx, html, md, json_label, json_detail, and png.
      tags:
        - Look
      parameters:
        - $ref: '#/components/parameters/lookId'
        - name: result_format
          in: path
          required: true
          description: Format for the query results
          schema:
            type: string
            enum:
              - json
              - csv
              - txt
              - xlsx
              - html
              - md
              - json_label
              - json_detail
              - png
        - $ref: '#/components/parameters/limit'
        - name: apply_formatting
          in: query
          description: Whether to apply model-specified formatting to results
          schema:
            type: boolean
        - name: apply_vis
          in: query
          description: Whether to apply visualization options to results
          schema:
            type: boolean
      responses:
        '200':
          description: Query results in the specified format
          content:
            application/json:
              schema:
                type: string
            text/csv:
              schema:
                type: string
        '404':
          description: Look not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /dashboards:
    get:
      operationId: allDashboards
      summary: Looker List all dashboards
      description: >-
        Returns a list of all dashboards accessible to the authenticated
        user. User-defined dashboards and LookML dashboards are both
        included. Use the fields parameter to limit response size.
      tags:
        - Dashboard
      parameters:
        - $ref: '#/components/parameters/fields'
      responses:
        '200':
          description: List of dashboards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dashboard'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createDashboard
      summary: Looker Create a dashboard
      description: >-
        Creates a new user-defined dashboard. The dashboard can be
        populated with tiles, filters, and layout settings after
        creation or as part of the request body.
      tags:
        - Dashboard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WriteDashboard'
      responses:
        '200':
          description: Dashboard created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dashboard'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /dashboards/search:
    get:
      operationId: searchDashboards
      summary: Looker Search dashboards
      description: >-
        Searches for dashboards matching the specified criteria including
        title, description, space, and creator. Results are paginated.
      tags:
        - Dashboard
      parameters:
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - name: title
          in: query
          description: Filter by dashboard title
          schema:
            type: string
        - name: description
          in: query
          description: Filter by dashboard description
          schema:
            type: string
        - name: space_id
          in: query
          description: Filter by space (folder) ID
          schema:
            type: string
        - name: user_id
          in: query
          description: Filter by creator user ID
          schema:
            type: string
        - name: sorts
          in: query
          description: Sort fields
          schema:
            type: string
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dashboard'
        '400':
          description: Invalid search parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /dashboards/{dashboard_id}:
    get:
      operationId: dashboard
      summary: Looker Get a dashboard
      description: >-
        Retrieves a single dashboard by its ID, including all dashboard
        elements (tiles), filters, and layout configuration. For
        user-defined dashboards the ID is numeric; for LookML dashboards
        the ID is the model::dashboard_name string.
      tags:
        - Dashboard
      parameters:
        - $ref: '#/components/parameters/dashboardId'
        - $ref: '#/components/parameters/fields'
      responses:
        '200':
          description: Dashboard details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dashboard'
        '404':
          description: Dashboard not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      operationId: updateDashboard
      summary: Looker Update a dashboard
      description: >-
        Updates an existing dashboard. Only the fields provided in the
        request body are updated. Dashboard elements and filters can
        be updated through their own dedicated endpoints.
      tags:
        - Dashboard
      parameters:
        - $ref: '#/components/parameters/dashboardId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WriteDashboard'
      responses:
        '200':
          description: Updated dashboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dashboard'
        '404':
          description: Dashboard not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteDashboard
      summary: Looker Delete a dashboard
      description: >-
        Permanently deletes the specified dashboard and all of its
        elements, filters, and layout configuration. This action
        cannot be undone.
      tags:
        - Dashboard
      parameters:
        - $ref: '#/components/parameters/dashboardId'
      responses:
        '204':
          description: Dashboard deleted successfully
        '404':
          description: Dashboard not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /dashboards/{dashboard_id}/dashboard_elements:
    get:
      operationId: dashboardDashboardElements
      summary: Looker List dashboard elements
      description: >-
        Returns all elements (tiles) for the specified dashboard. Each
        element contains a query, a Look reference, or a text/markdown
        content block along with positioning and size information.
      tags:
        - Dashboard
      parameters:
        - $ref: '#/components/parameters/dashboardId'
        - $ref: '#/components/parameters/fields'
      responses:
        '200':
          description: List of dashboard elements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DashboardElement'
        '404':
          description: Dashboard not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /dashboards/{dashboard_id}/dashboard_filters:
    get:
      operationId: dashboardDashboardFilters
      summary: Looker List dashboard filters
      description: >-
        Returns all filters defined on the specified dashboard. Dashboard
        filters allow users to dynamically change query parameters across
        all tiles that listen to a given filter.
      tags:
        - Dashboard
      parameters:
        - $ref: '#/components/parameters/dashboardId'
        - $ref: '#/components/parameters/fields'
      responses:
        '200':
          description: List of dashboard filters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DashboardFilter'
        '404':
          description: Dashboard not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /queries:
    post:
      operationId: createQuery
      summary: Looker Create a query
      description: >-
        Creates a new query object. A query defines the model, view,
        fields, filters, sorts, and limit used to retrieve data from
        the underlying database. The query is not executed until you
        call the run_query endpoint. Queries are immutable once created.
      tags:
        - Query
      parameters:
        - $ref: '#/components/parameters/fields'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WriteQuery'
      responses:
        '200':
          description: Query created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Query'
        '400':
          description: Invalid query definition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /queries/{query_id}:
    get:
      operationId: query
      summary: Looker Get a query
      description: >-
        Retrieves a query object by its ID. Returns the query
        definition including the model, view, fields, filters,
        sorts, and limit.
      tags:
        - Query
      parameters:
        - $ref: '#/components/parameters/queryId'
        - $ref: '#/components/parameters/fields'
      responses:
        '200':
          description: Query details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Query'
        '404':
          description: Query not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /queries/{query_id}/run/{result_format}:
    get:
      operationId: runQuery
      summary: Looker Run a saved query
      description: >-
        Executes a previously saved query and returns results in the
        specified format. The query must already exist. Supported
        formats include json, csv, txt, xlsx, html, md, json_label,
        json_detail, sql, and png.
      tags:
        - Query
      parameters:
        - $ref: '#/components/parameters/queryId'
        - name: result_format
          in: path
          required: true
          description: Format for the query results
          schema:
            type: string
            enum:
              - json
              - csv
              - txt
              - xlsx
              - html
              - md
              - json_label
              - json_detail
              - sql
              - png
        - $ref: '#/components/parameters/limit'
        - name: apply_formatting
          in: query
          description: Whether to apply model-specified formatting
          schema:
            type: boolean
        - name: apply_vis
          in: query
          description: Whether to apply visualization options
          schema:
            type: boolean
        - name: cache
          in: query
          description: Whether to use cached results if available
          schema:
            type: boolean
            default: true
        - name: generate_drill_links
          in: query
          description: Whether to generate drill links in results
          schema:
            type: boolean
            default: true
        - name: force_production
          in: query
          description: Whether to force use of production models
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Query results in the requested format
          content:
            application/json:
              schema:
                type: string
            text/csv:
              schema:
                type: string
        '404':
          description: Query not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /queries/run/{result_format}:
    post:
      operationId: runInlineQuery
      summary: Looker Run an inline query
      description: >-
        Creates and immediately executes a query in a single request.
        The query definition is provided in the request body and does
        not need to be saved first. This is useful for ad-hoc queries.
      tags:
        - Query
      parameters:
        - name: result_format
          in: path
          required: true
          description: Format for the query results
          schema:
            type: string
            enum:
              - json
              - csv
              - txt
              - xlsx
              - html
              - md
              - json_label
              - json_detail
              - sql
              - png
        - $ref: '#/components/parameters/limit'
        - name: apply_formatting
          in: query
          description: Whether to apply model-specified formatting
          schema:
            type: boolean
        - name: apply_vis
          in: query
          description: Whether to apply visualization options
          schema:
            type: boolean
        - name: cache
          in: query
          description: Whether to use cached results
          schema:
            type: boolean
            default: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WriteQuery'
      responses:
        '200':
          description: Query results in the requested format
          content:
            application/json:
              schema:
                type: string
            text/csv:
              schema:
                type: string
        '400':
          description: Invalid query definition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users:
    get:
      operationId: allUsers
      summary: Looker List all users
      description: >-
        Returns a list of all Looker user accounts. The response includes
        basic user information. Use the fields parameter to include
        additional details such as roles, credentials, and sessions.
      tags:
        - User
      parameters:
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - name: sorts
          in: query
          description: Sort fields (e.g. last_name asc, created_at desc)
          schema:
            type: string
        - name: ids
          in: query
          description: Comma-separated list of user IDs to retrieve
          schema:
            type: string
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createUser
      summary: Looker Create a user
      description: >-
        Creates a new Looker user account. The new user will not have
        any credentials or roles assigned; those must be configured
        separately via the credentials and role endpoints.
      tags:
        - User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WriteUser'
      responses:
        '200':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/search:
    get:
      operationId: searchUsers
      summary: Looker Search users
      description: >-
        Searches for users matching the specified criteria. Supports
        filtering by name, email, and other user attributes. Results
        are paginated.
      tags:
        - User
      parameters:
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - name: first_name
          in: query
          description: Filter by first name
          schema:
            type: string
        - name: last_name
          in: query
          description: Filter by last name
          schema:
            type: string
        - name: email
          in: query
          description: Filter by email address
          schema:
            type: string
        - name: is_disabled
          in: query
          description: Filter by disabled status
          schema:
            type: boolean
        - name: sorts
          in: query
          description: Sort fields
          schema:
            type: string
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '400':
          description: Invalid search parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/{user_id}:
    get:
      operationId: user
      summary: Looker Get a user
      description: >-
        Retrieves a single user by their ID including their profile
        information, roles, and credential settings.
      tags:
        - User
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/fields'
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      operationId: updateUser
      summary: Looker Update a user
      description: >-
        Updates an existing user account. Only the fields provided in
        the request body are updated. Credentials and roles are managed
        through separate endpoints.
      tags:
        - User
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/fields'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WriteUser'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteUser
      summary: Looker Delete a user
      description: >-
        Permanently deletes the specified user account. This removes
        the user and all their credentials. Content created by the
        user (dashboards, Looks, etc.) is not deleted.
      tags:
        - User
      parameters:
        - $ref: '#/components/parameters/userId'
      responses:
        '204':
          description: User deleted successfully
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/me:
    get:
      operationId: me
      summary: Looker Get current user
      description: >-
        Returns the user record for the currently authenticated user.
        This is useful for determining which user is associated with
        the current API session.
      tags:
        - User
      parameters:
        - $ref: '#/components/parameters/fields'
      responses:
        '200':
          description: Current user details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/{user_id}/roles:
    get:
      operationId: userRoles
      summary: Looker Get user roles
      description: >-
        Returns all roles assigned to the specified user. Roles define
        the permissions and model access granted to the user.
      tags:
        - User
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/fields'
      responses:
        '200':
          description: List of user roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Role'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: setUserRoles
      summary: Looker Set user roles
      description: >-
        Replaces all roles assigned to the specified user. Provide
        the complete list of role IDs that should be assigned to the
        user. Any roles not included in the request will be removed.
      tags:
        - User
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/fields'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: integer
                format: int64
              description: Array of role IDs to assign
      responses:
        '200':
          description: Updated role assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Role'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >-
        Access token obtained from the /login endpoint using client
        credentials. Include as Bearer token in the Authorization header.
  parameters:
    fields:
      name: fields
      in: query
      description: >-
        Comma-separated list of field names to include in the response.
        Use this to limit response payload and improve performance.
      schema:
        type: string
    limit:
      name: limit
      in: query
      description: Maximum number of results to return
      schema:
        type: integer
        default: 100
    offset:
      name: offset
      in: query
      description: Number of results to skip before returning results
      schema:
        type: integer
        default: 0
    lookId:
      name: look_id
      in: path
      required: true
      description: The unique numeric ID of the Look
      schema:
        type: integer
        format: int64
    dashboardId:
      name: dashboard_id
      in: path
      required: true
      description: >-
        The dashboard ID. Numeric for user-defined dashboards or
        model::dashboard_name for LookML dashboards.
      schema:
        type: string
    queryId:
      name: query_id
      in: path
      required: true
      description: The unique numeric ID of the query
      schema:
        type: integer
        format: int64
    userId:
      name: user_id
      in: path
      required: true
      description: The unique numeric ID of the user
      schema:
        type: integer
        format: int64
  schemas:
    AccessToken:
      type: object
      description: An API access token returned after successful authentication
      properties:
        access_token:
          type: string
          description: The OAuth2 access token string
        token_type:
          type: string
          description: Token type, always 'Bearer'
          default: Bearer
        expires_in:
          type: integer
          description: Number of seconds until the token expires
        refresh_token:
          type: string
          nullable: true
          description: Refresh token (not used in API client credential flow)
    Look:
      type: object
      description: >-
        A Look is a saved query with a visualization. Looks can be
        shared, embedded, scheduled for delivery, and added to
        dashboards as tiles.
      properties:
        id:
          type: integer
          format: int64
          description: Unique numeric identifier for this Look
          readOnly: true
        title:
          type: string
          description: Display title of the Look
        description:
          type: string
          nullable: true
          description: Description of the Look's purpose
        content_metadata_id:
          type: integer
          format: int64
          description: ID of the content metadata record
          readOnly: true
        query_id:
          type: integer
          format: int64
          description: ID of the query associated with this Look
        query:
          $ref: '#/components/schemas/Query'
        space_id:
          type: string
          description: ID of the space (folder) containing this Look
        folder_id:
          type: string
          description: ID of the folder containing this Look
        user_id:
          type: integer
          format: int64
          description: ID of the user who created this Look
          readOnly: true
        space:
          $ref: '#/components/schemas/SpaceBase'
        folder:
          $ref: '#/components/schemas/FolderBase'
        public:
          type: boolean
          description: Whether this Look is publicly accessible
        is_run_on_load:
          type: boolean
          description: Whether the query runs automatically when the Look is loaded
        created_at:
          type: string
          format: date-time
          description: Timestamp when the Look was created
          readOnly: true
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the Look was last updated
          readOnly: true
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the Look was soft-deleted
          readOnly: true
        deleted:
          type: boolean
          description: Whether this Look has been soft-deleted
          readOnly: true
        last_accessed_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the Look was last viewed
          readOnly: true
        view_count:
          type: integer
          description: Number of times the Look has been viewed
          readOnly: true
        favorite_count:
          type: integer
          description: Number of users who have favorited this Look
          readOnly: true
        model:
          $ref: '#/components/schemas/LookModel'
        url:
          type: string
          description: Relative URL path for this Look
          readOnly: true
    WriteLookWithQuery:
      type: object
      description: Writable fields for creating or updating a Look
      properties:
        title:
          type: string
          description: Display title
        description:
          type: string
          nullable: true
          description: Description of the Look
        space_id:
          type: string
          description: Space (folder) ID to place the Look in
        folder_id:
          type: string
          description: Folder ID to place the Look in
        query_id:
          type: integer
          format: int64
          description: ID of the query to use
        query:
          $ref: '#/components/schemas/WriteQuery'
        public:
          type: boolean
          description: Whether the Look is public
        is_run_on_load:
          type: boolean
          description: Whether to auto-run the query on load
    Dashboard:
      type: object
      description: >-
        A dashboard is a collection of tiles arranged in a layout that
        visualize data from queries. Dashboards support cross-filtering,
        drill-down, and can be shared, embedded, or scheduled.
      properties:
        id:
          type: string
          description: >-
            Unique identifier. Numeric for user-defined dashboards;
            model::dashboard_name for LookML dashboards.
          readOnly: true
        title:
          type: string
          description: Display title of the dashboard
        description:
          type: string
          nullable: true
          description: Description of the dashboard's purpose
        content_metadata_id:
          type: integer
          format: int64
          description: ID of the content metadata record
          readOnly: true
        query_timezone:
          type: string
          description: Timezone for queries on this dashboard
        space_id:
          type: string
          description: ID of the space (folder) containing this dashboard
        folder_id:
          type: string
          description: ID of the folder containing this dashboard
        user_id:
          type: integer
          format: int64
          description: ID of the user who created this dashboard
          readOnly: true
        space:
          $ref: '#/components/schemas/SpaceBase'
        folder:
          $ref: '#/components/schemas/FolderBase'
        dashboard_elements:
          type: array
          description: List of tiles (elements) on this dashboard
          items:
            $ref: '#/components/schemas/DashboardElement'
        dashboard_filters:
          type: array
          description: List of filters on this dashboard
          items:
            $ref: '#/components/schemas/DashboardFilter'
        dashboard_layouts:
          type: array
          description: Layout configurations for this dashboard
          items:
            $ref: '#/components/schemas/DashboardLayout'
        background_color:
          type: string
          description: CSS background color for the dashboard
        text_tile_text_color:
          type: string
          description: Default text color for text tiles
        tile_background_color:
          type: string
          description: Default background color for tiles
        tile_text_color:
          type: string
          description: Default text color for tiles
        hidden:
          type: boolean
          description: Whether this dashboard is hidden from navigation
        readonly:
          type: boolean
          description: Whether this dashboard is read-only (LookML dashboards are read-only)
          readOnly: true
        refresh_interval:
          type: string
          nullable: true
          description: Auto-refresh interval (e.g. 5 minutes, 1 hour)
        load_configuration:
          type: string
          nullable: true
          description: >-
            Dashboard load configuration. Controls whether tiles load
            concurrently or sequentially.
        preferred_viewer:
          type: string
          description: Preferred viewer type for the dashboard
        created_at:
          type: string
          format: date-time
          description: Timestamp when the dashboard was created
          readOnly: true
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the dashboard was last updated
          readOnly: true
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the dashboard was soft-deleted
          readOnly: true
        deleted:
          type: boolean
          description: Whether this dashboard has been soft-deleted
          readOnly: true
        last_accessed_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the dashboard was last viewed
          readOnly: true
        view_count:
          type: integer
          description: Number of times the dashboard has been viewed
          readOnly: true
        favorite_count:
          type: integer
          description: Number of users who have favorited this dashboard
          readOnly: true
        url:
          type: string
          description: Relative URL path for this dashboard
          readOnly: true
        model:
          $ref: '#/components/schemas/LookModel'
    WriteDashboard:
      type: object
      description: Writable fields for creating or updating a dashboard
      properties:
        title:
          type: string
          description: Display title
        description:
          type: string
          nullable: true
          description: Description of the dashboard
        space_id:
          type: string
          description: Space (folder) ID
        folder_id:
          type: string
          description: Folder ID
        query_timezone:
          type: string
          description: Timezone for queries
        background_color:
          type: string
          description: CSS background color
        text_tile_text_color:
          type: string
          description: Default text color for text tiles
        tile_background_color:
          type: string
          description: Default background color for tiles
        tile_text_color:
          type: string
          description: Default text color for tiles
        hidden:
          type: boolean
          description: Whether the dashboard is hidden
        refresh_interval:
          type: string
          nullable: true
          description: Auto-refresh interval
        load_configuration:
          type: string
          nullable: true
          description: Tile load configuration
        preferred_viewer:
          type: string
          description: Preferred viewer type
    DashboardElement:
      type: object
      description: >-
        A single tile on a dashboard. Each element can contain a query,
        a reference to a Look, a merge query, or text/markdown content.
      properties:
        id:
          type: string
          description: Unique identifier for this element
          readOnly: true
        dashboard_id:
          type: string
          description: ID of the parent dashboard
        look_id:
          type: integer
          format: int64
          nullable: true
          description: ID of a Look to display in this tile
        query_id:
          type: integer
          format: int64
          nullable: true
          description: ID of a query to run in this tile
        query:
          $ref: '#/components/schemas/Query'
        look:
          $ref: '#/components/schemas/Look'
        type:
          type: string
          description: Element type
          enum:
            - vis
            - text
            - data
            - filter
        title:
          type: string
          description: Display title for this tile
        title_hidden:
          type: boolean
          description: Whether the title is hidden
        subtitle_text:
          type: string
          nullable: true
          description: Subtitle text displayed below the title
        body_text:
          type: string
          nullable: true
          description: Body text for text-type elements
        note_text:
          type: string
          nullable: true
          description: Note text displayed on the tile
        note_display:
          type: string
          nullable: true
          description: How the note is displayed (above, below, hover)
        note_state:
          type: string
          nullable: true
          description: Note display state
        result_maker:
          type: object
          nullable: true
          description: Result maker configuration for merged queries
        rich_content_json:
          type: string
          nullable: true
          description: Rich content JSON for advanced text elements
    DashboardFilter:
      type: object
      description: >-
        A filter on a dashboard that allows users to dynamically change
        query parameters across multiple tiles simultaneously.
      properties:
        id:
          type: string
          description: Unique identifier for this filter
          readOnly: true
        dashboard_id:
          type: string
          description: ID of the parent dashboard
        name:
          type: string
          description: Internal name of the filter
        title:
          type: string
          description: Display title of the filter
        type:
          type: string
          description: Filter input type
          enum:
            - field_filter
            - date_filter
            - number_filter
            - string_filter
        model:
          type: string
          nullable: true
          description: LookML model name for field_filter type
        explore:
          type: string
          nullable: true
          description: LookML explore name for field_filter type
        dimension:
          type: string
          nullable: true
          description: LookML dimension for field_filter type
        default_value:
          type: string
          nullable: true
          description: Default filter value
        allow_multiple_values:
          type: boolean
          description: Whether multiple values can be selected
        required:
          type: boolean
          description: Whether the filter must have a value
        row:
          type: integer
          description: Row position of the filter in the filter bar
        listens_to_filters:
          type: array
          description: Other filters this filter listens to for cascading
          items:
            type: string
    DashboardLayout:
      type: object
      description: Layout configuration for a dashboard defining tile positions
      properties:
        id:
          type: string
          description: Unique identifier for this layout
          readOnly: true
        dashboard_id:
          type: string
          description: ID of the parent dashboard
        type:
          type: string
          description: Layout type
        active:
          type: boolean
          description: Whether this is the active layout
        column_width:
          type: integer
          description: Width of each column in the grid
        width:
          type: integer
          description: Total width of the layout
        dashboard_layout_components:
          type: array
          description: Positioning of elements within this layout
          items:
            $ref: '#/components/schemas/DashboardLayoutComponent'
    DashboardLayoutComponent:
      type: object
      description: Position and size of a single element within a dashboard layout
      properties:
        id:
          type: string
          description: Unique identifier
          readOnly: true
        dashboard_layout_id:
          type: string
          description: ID of the parent layout
        dashboard_element_id:
          type: string
          description: ID of the dashboard element this positions
        row:
          type: integer
          description: Row position in the grid
        column:
          type: integer
          description: Column position in the grid
        width:
          type: integer
          description: Width in grid units
        height:
          type: integer
          description: Height in grid units
    Query:
      type: object
      description: >-
        A query defines a data request against a LookML model. Queries
        are immutable once created and contain the model, view, fields,
        filters, sorts, and limit needed to generate SQL and retrieve
        results.
      properties:
        id:
          type: integer
          format: int64
          description: Unique numeric identifier for this query
          readOnly: true
        model:
          type: string
          description: LookML model name
        view:
          type: string
          description: LookML explore (view) name
        fields:
          type: array
          description: >-
            List of field names to include in the query results (e.g.
            orders.count, users.created_date)
          items:
            type: string
        pivots:
          type: array
          nullable: true
          description: List of field names to pivot on
          items:
            type: string
        fill_fields:
          type: array
          nullable: true
          description: Fields to fill missing date values for
          items:
            type: string
        filters:
          type: object
          nullable: true
          description: >-
            Key-value map of filter expressions. Keys are field names
            and values are Looker filter expressions.
          additionalProperties:
            type: string
        filter_expression:
          type: string
          nullable: true
          description: Custom filter expression using Looker filter syntax
        sorts:
          type: array
          nullable: true
          description: >-
            Sort order for results. Each item is a field name optionally
            followed by asc or desc.
          items:
            type: string
        limit:
          type: string
          nullable: true
          description: Maximum number of rows to return (as string)
        column_limit:
          type: string
          nullable: true
          description: Maximum number of columns for pivoted results
        total:
          type: boolean
          description: Whether to include row totals
        row_total:
          type: string
          nullable: true
          description: Row total display setting
        subtotals:
          type: array
          nullable: true
          description: Fields to subtotal on
          items:
            type: string
        dynamic_fields:
          type: string
          nullable: true
          description: JSON string of dynamic field definitions
        vis_config:
          type: object
          nullable: true
          description: Visualization configuration object
          additionalProperties: true
        query_timezone:
          type: string
          nullable: true
          description: Timezone for date/time calculations
        client_id:
          type: string
          description: Client-generated hash of the query for caching
          readOnly: true
        slug:
          type: string
          description: Short unique URL slug for this query
          readOnly: true
        share_url:
          type: string
          description: Shareable URL for this query
          readOnly: true
        url:
          type: string
          description: Relative URL for this query in the Looker UI
          readOnly: true
        has_table_calculations:
          type: boolean
          description: Whether this query has table calculations
          readOnly: true
    WriteQuery:
      type: object
      required:
        - model
        - view
      description: Writable fields for creating a new query
      properties:
        model:
          type: string
          description: LookML model name
        view:
          type: string
          description: LookML explore (view) name
        fields:
          type: array
          description: List of field names to include
          items:
            type: string
        pivots:
          type: array
          nullable: true
          description: Fields to pivot on
          items:
            type: string
        fill_fields:
          type: array
          nullable: true
          description: Fields to fill missing values for
          items:
            type: string
        filters:
          type: object
          nullable: true
          description: Filter expressions keyed by field name
          additionalProperties:
            type: string
        filter_expression:
          type: string
          nullable: true
          description: Custom filter expression
        sorts:
          type: array
          nullable: true
          description: Sort order for results
          items:
            type: string
        limit:
          type: string
          nullable: true
          description: Maximum rows to return
        column_limit:
          type: string
          nullable: true
          description: Maximum columns for pivoted results
        total:
          type: boolean
          description: Include row totals
        row_total:
          type: string
          nullable: true
          description: Row total setting
        subtotals:
          type: array
          nullable: true
          description: Fields to subtotal on
          items:
            type: string
        dynamic_fields:
          type: string
          nullable: true
          description: JSON string of dynamic field definitions
        vis_config:
          type: object
          nullable: true
          description: Visualization configuration
          additionalProperties: true
        query_timezone:
          type: string
          nullable: true
          description: Timezone for date/time calculations
    User:
      type: object
      description: >-
        A Looker user account. Users have credentials, roles, and can
        own content such as Looks, dashboards, and queries.
      properties:
        id:
          type: integer
          format: int64
          description: Unique numeric identifier
          readOnly: true
        first_name:
          type: string
          description: First name
        last_name:
          type: string
          description: Last name
        display_name:
          type: string
          description: Full display name
          readOnly: true
        email:
          type: string
          description: Email address
        avatar_url:
          type: string
          description: URL of the user's avatar image
          readOnly: true
        is_disabled:
          type: boolean
          description: Whether the user account is disabled
        locale:
          type: string
          nullable: true
          description: User's locale setting
        home_space_id:
          type: string
          nullable: true
          description: ID of the user's personal space (folder)
          readOnly: true
        home_folder_id:
          type: string
          nullable: true
          description: ID of the user's personal folder
          readOnly: true
        personal_space_id:
          type: integer
          format: int64
          nullable: true
          description: ID of the user's personal space
          readOnly: true
        personal_folder_id:
          type: integer
          format: int64
          nullable: true
          description: ID of the user's personal folder
          readOnly: true
        presumed_looker_employee:
          type: boolean
          description: Whether the user is a Looker employee
          readOnly: true
        verified_looker_employee:
          type: boolean
          description: Whether the user is a verified Looker employee
          readOnly: true
        roles_externally_managed:
          type: boolean
          description: Whether user roles are managed externally (e.g. via SAML)
          readOnly: true
        allow_direct_roles:
          type: boolean
          description: Whether roles can be assigned directly to this user
          readOnly: true
        allow_normal_group_membership:
          type: boolean
          description: Whether the user can be added to groups
          readOnly: true
        allow_roles_from_normal_groups:
          type: boolean
          description: Whether the user inherits roles from groups
          readOnly: true
        embed_group_space_id:
          type: integer
          format: int64
          nullable: true
          description: Embed group space ID
          readOnly: true
        credentials_email:
          $ref: '#/components/schemas/CredentialsEmail'
        credentials_api3:
          type: array
          description: API3 credentials for this user
          items:
            $ref: '#/components/schemas/CredentialsApi3'
          readOnly: true
        sessions:
          type: array
          description: Active sessions for this user
          items:
            $ref: '#/components/schemas/Session'
          readOnly: true
        role_ids:
          type: array
          description: IDs of roles assigned to this user
          items:
            type: integer
            format: int64
          readOnly: true
        group_ids:
          type: array
          description: IDs of groups this user belongs to
          items:
            type: integer
            format: int64
          readOnly: true
        url:
          type: string
          description: Relative URL for this user
          readOnly: true
        created_at:
          type: string
          format: date-time
          description: Timestamp when the user was created
          readOnly: true
    WriteUser:
      type: object
      description: Writable fields for creating or updating a user
      properties:
        first_name:
          type: string
          description: First name
        last_name:
          type: string
          description: Last name
        email:
          type: string
          description: Email address
        is_disabled:
          type: boolean
          description: Whether the account is disabled
        locale:
          type: string
          nullable: true
          description: Locale setting
    Role:
      type: object
      description: >-
        A role defines a set of permissions and model access controls
        that can be assigned to users and groups.
      properties:
        id:
          type: integer
          format: int64
          description: Unique numeric identifier
          readOnly: true
        name:
          type: string
          description: Display name of the role
        permission_set:
          $ref: '#/components/schemas/PermissionSet'
        permission_set_id:
          type: integer
          format: int64
          description: ID of the permission set assigned to this role
        model_set:
