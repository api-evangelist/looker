        home_folder_id:
          type: string
          nullable: true
          description: ID of the user's personal folder
          readOnly: true
          example: '500123'
        personal_space_id:
          type: integer
          format: int64
          nullable: true
          description: ID of the user's personal space
          readOnly: true
          example: '500123'
        personal_folder_id:
          type: integer
          format: int64
          nullable: true
          description: ID of the user's personal folder
          readOnly: true
          example: '500123'
        presumed_looker_employee:
          type: boolean
          description: Whether the user is a Looker employee
          readOnly: true
          example: true
        verified_looker_employee:
          type: boolean
          description: Whether the user is a verified Looker employee
          readOnly: true
          example: true
        roles_externally_managed:
          type: boolean
          description: Whether user roles are managed externally (e.g. via SAML)
          readOnly: true
          example: true
        allow_direct_roles:
          type: boolean
