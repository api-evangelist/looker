specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Looker
providerId: looker
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Rate Limiting
  - BI Platform
  - Business Intelligence
description: Looker (Google Cloud) enforces monthly API call quotas that scale with edition (Standard /
  Enterprise / Embed). Quotas are split between query-based API calls and administrative API calls. Per-second
  throttling is governed by the Looker (Google Cloud core) API service quotas via Google Cloud Quotas;
  raise via support.
sources:
  - https://cloud.google.com/looker/pricing
  - https://cloud.google.com/looker/docs
responseCodes:
  throttled: 429
  quotaExceeded: 429
limits:
  - name: Query-based API calls (Standard)
    scope: account
    metric: requests_per_month
    limit: 1000
    timeFrame: month
  - name: Administrative API calls (Standard)
    scope: account
    metric: requests_per_month
    limit: 1000
    timeFrame: month
  - name: Query-based API calls (Enterprise)
    scope: account
    metric: requests_per_month
    limit: 100000
    timeFrame: month
  - name: Administrative API calls (Enterprise)
    scope: account
    metric: requests_per_month
    limit: 10000
    timeFrame: month
  - name: Query-based API calls (Embed)
    scope: account
    metric: requests_per_month
    limit: 500000
    timeFrame: month
  - name: Administrative API calls (Embed)
    scope: account
    metric: requests_per_month
    limit: 100000
    timeFrame: month
  - name: Conversational Analytics input tokens (per Developer User)
    scope: user
    metric: tokens_per_month
    limit: 4000000
    timeFrame: month
  - name: Conversational Analytics output tokens (per Developer User)
    scope: user
    metric: tokens_per_month
    limit: 80000
    timeFrame: month
policies:
  - name: Edition-scoped quotas
    description: API call quotas are split between query-based and administrative APIs and scale by edition.
  - name: Per-user token quotas
    description: Conversational Analytics tokens are quota'd per user role; overage applies after Oct 1 2026.
  - name: Cloud quota
    description: For the Looker (Google Cloud core) API, additional per-second/per-region throttling
      is governed by Google Cloud quotas; request increases via the Cloud Quotas page.
  - name: Backoff
    description: On 429, retry with exponential backoff and respect Retry-After when present.
