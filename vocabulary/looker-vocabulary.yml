name: Looker Domain Vocabulary
provider: Looker
providerId: looker
description: Tag-derived vocabulary for the Looker API surface; sourced from openapi/ tags.
terms:
- term: Auth
  description: Authentication endpoints for obtaining and managing API access tokens using client credentials.
- term: Dashboard
  description: Manage dashboards, which are collections of tiles displaying visualizations from queries. Dashboards support
    filters, layouts, and can be shared across the organization.
- term: Look
  description: Manage Looks, which are saved queries with visualizations. A Look contains a query definition and visualization
    configuration that can be shared, scheduled, and embedded.
- term: Query
  description: Create and run queries against your Looker models. Queries define the fields, filters, sorts, and limits used
    to retrieve data from the underlying database through LookML models.
- term: User
  description: Manage Looker users including creating, updating, and retrieving user accounts, credentials, roles, and sessions.
